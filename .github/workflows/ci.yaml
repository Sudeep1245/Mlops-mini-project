name : CI pipeline

on : push

jobs :
  project-tessting:
    runs-on: ubuntu-latest

    steps:
      - name : checkout code
        uses : actions/checkout@v3

      - name : setup-python
        uses : actions/setup-python@v2
        with:
          python-version: '3.11'

      - name : install dependency
        run : |
          pip install -r requirements.txt

      - name : run pipeline
        env:
          DAGSHUB_CONN : ${{ secrets.DAGSHUB_CONN }}
        run : |
          dvc repro

